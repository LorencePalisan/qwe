<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Whodini</title>
    <script>
      // Redirect all GitHub Pages 404s back to index.html, encoding the
      // intended path as a query param so the restore script in index.html
      // can call history.replaceState() with the original URL.
      // pathSegmentsToKeep = 1 because our base is /qwe/ (one segment).
      var segmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
